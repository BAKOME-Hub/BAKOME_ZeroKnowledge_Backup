<!doctype html>
<html lang="en" class="no-js">
<head>
<meta charset="utf-8">
<title>Zero‑Knowledge Backup Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

:root{
  --bg-dark:#0d1117;
  --card-bg:rgba(255,255,255,.07);
  --accent:#39FF14;          /* neon green */
  --text:#e2e8f0;
  --glass-fallback:#111;
  --card-radius:12px;
  --spacing:1rem;
}

*{box-sizing:border-box;margin:0;padding:0}
html{font-family:system-ui, -apple-system, sans-serif;background:var(--bg-dark);color:var(--text);scroll-behavior:smooth}
body{padding:var(--spacing)}

/* Global Layout */
header{margin-bottom:calc(2*var(--spacing));text-align:center}
header h1{font-size:3rem;font-weight:900;color:var(--accent)}
header p{margin-top:.5rem;font-size:1.2rem}

.grid{display:grid;gap:var(--spacing);margin-bottom:calc(2*var(--spacing))}
.stats{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.features{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.card{background:var(--card-bg);border-radius:var(--card-radius);box-shadow:0 4px 30px rgba(0,0,0,.5);overflow:hidden;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:var(--spacing)}
.card h3{margin-bottom:.4rem;font-size:1.4rem;color:var(--accent)}
.card p{font-size:.93rem}

/* Stats numbers */
.stat-num{font-size:2.5rem;font-weight:900;margin:0;color:var(--accent)}
.stat-label{font-size:.85rem;color:#a0a4a9}

/* Features icons */
.feature-icon{font-size:3rem;margin-bottom:.5rem;display:inline-block}

/* Code block */
.code{background:rgba(0,0,0,.4);border-radius:var(--card-radius);padding:1rem;overflow:auto}
.code pre{margin:0;font-family:ui-monospace, monospace;font-size:.9rem;color:var(--accent)}

@media(max-width:600px){
  header h1{font-size:2.2rem}
  .stat-num{font-size:2rem}
  .stat-label{font-size:.8rem}
}
</style>
</head>
<body>

<!-- Animated background (gradient) – stays behind content -->
<div id="bg" style="
  position:fixed; inset:0; z-index:-1;
  background:linear-gradient(45deg, #111, #222, #111);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;"
></div>

<!-- Particles container (over gradient) -->
<div id="tsparticles" style="position:absolute; inset:0; z-index:-2;"></div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.9.3/tsparticles.min.js"></script>
<script>
tsParticles.load("tsparticles",{
  background:{color:{value:"transparent"}},
  fpsLimit:60,
  interactivity:{
    detectsOn:"canvas",
    events:{
      onHover:{enable:true,mode:"repulse"},
      resize:true
    },
    modes:{repulse:{distance:100, duration:0.4}}
  },
  particles:{
    color:{value:"#39FF14"},
    links:{color:"#39FF14",distance:150,enable:true,opacity:0.3},
    move:{direction:"none",enable:true,random:true,straight:false,warp:true},
    number:{density:{enable:true,value_area:800},limit:0,value:80},
    opacity:{animation:{enable:true,minimumValue:0.1, speed:1},value:.5},
    shape:{type:"circle"},
    size:{random:true, value:5}
  },
  detectRetina:true
});
</script>

<header>
  <h1>Zero‑Knowledge Backup</h1>
  <p>Store, encrypt, and recover data with no knowledge of your secrets.</p>
</header>

<div class="grid stats">
  <!-- Stats Cards -->
  <div class="card">
    <div class="stat-num">1.2 TB</div>
    <div class="stat-label">Encrypted Storage</div>
  </div>
  <div class="card">
    <div class="stat-num">256 bit</div>
    <div class="stat-label">Encryption Strength</div>
  </div
