<!DOCTYPE html>
<html>
<head>
    <title>BAKOME ZK Backup — Dashboard</title>
    <style>
        body { background: #0a0a1a; color: #fff; font-family: monospace; padding: 20px; }
        .card { background: #1a1a2e; padding: 20px; margin: 10px 0; border-radius: 10px; border-left: 3px solid #10b981; }
        .metric { color: #10b981; font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔒 BAKOME Zero-Knowledge Backup v1.0</h1>
    <div class="card">
        <h3>🔐 Encryption</h3>
        <p class="metric">AES-256-GCM</p>
        <p>✅ Client-side encryption | ✅ Zero-Knowledge architecture</p>
    </div>
    <div class="card">
        <h3>🔑 Key Derivation</h3>
        <p class="metric">Argon2id</p>
        <p>✅ Memory-hard | ✅ Brute-force resistant</p>
    </div>
    <div class="card">
        <h3>☁️ Storage</h3>
        <p>WebDAV | S3 | IPFS | Local Disk</p>
        <p>✅ Server sees only random noise</p>
    </div>
</body>
</html>
